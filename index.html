<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 15px; 
            background-color: #f8f9fa; 
            margin: 0;
            color: #333;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        h3 { text-align: center; color: #2d3436; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #555;
        }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #dfe6e9; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; /* Telefon klaviaturasi ochilganda ekran sakramaydi */
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus { border-color: #0984e3; }
        
        .days-label { font-weight: 600; font-size: 14px; margin: 15px 0 10px; display: block; }
        
        .days-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
            margin-bottom: 25px; 
        }
        
        .day-btn { 
            padding: 12px; 
            background: white; 
            border: 2px solid #dfe6e9; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 13px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        
        .day-btn.active { 
            background: #0984e3; 
            color: white; 
            border-color: #0984e3; 
        }
        
        .save-btn { 
            width: 100%; 
            padding: 18px; 
            background: #00b894; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }
        
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <h3>🌸 Yangi vazifa</h3>
        
        <div class="form-group">
            <label>1. Gulning nomi</label>
            <input type="text" id="flower" placeholder="Masalan: Fikus">
        </div>

        <div class="form-group">
            <label>2. Mas'ul (Ism Familiya)</label>
            <input type="text" id="name" placeholder="Ali Valiyev">
        </div>

        <div class="form-group">
            <label>3. Mas'ul telefoni</label>
            <input type="tel" id="phone" placeholder="+998901234567">
        </div>

        <span class="days-label">Sug'orish kunlarini tanlang:</span>
        <div class="days-grid">
            <div class="day-btn" onclick="this.classList.toggle('active')">Dushanba</div>
            <div class="day-btn" onclick="this.classList.toggle('active')">Seshanba</div>
            <div class="day-btn" onclick="this.classList.toggle('active')">Chorshanba</div>
            <div class="day-btn" onclick="this.classList.toggle('active')">Payshanba</div>
            <div class="day-btn" onclick="this.classList.toggle('active')">Juma</div>
            <div class="day-btn" onclick="this.classList.toggle('active')">Shanba</div>
            <div class="day-btn" onclick="this.classList.toggle('active')">Yakshanba</div>
        </div>

        <button class="save-btn" onclick="sendToBot()">💾 SAQLASH</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Mini Appni to'liq ekranga yoyish

        function sendToBot() {
            let flower = document.getElementById('flower').value;
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            let days = Array.from(document.querySelectorAll('.day-btn.active')).map(x => x.innerText).join(', ');

            if(!flower || !name || !phone) {
                tg.showAlert("Iltimos, hamma joyni to'ldiring!");
                return;
            }

            let result = {
                flower: flower,
                resp_name: name,
                resp_phone: phone,
                days: days
            };

            tg.sendData(JSON.stringify(result));
            tg.close();
        }
    </script>
</body>
</html>
