<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .day { display: inline-block; padding: 8px; margin: 4px; background: #ddd; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .day.active { background: #28a745; color: white; }
    </style>
</head>
<body>
    <h3>Gullar Tizimi</h3>
    <input type="text" id="n" placeholder="Gul nomi">
    <input type="text" id="p" placeholder="Mas'ul tel (+998...)">
    <div id="days">
        <div class="day" onclick="this.classList.toggle('active')">Dushanba</div>
        <div class="day" onclick="this.classList.toggle('active')">Seshanba</div>
        <div class="day" onclick="this.classList.toggle('active')">Chorshanba</div>
        <div class="day" onclick="this.classList.toggle('active')">Payshanba</div>
        <div class="day" onclick="this.classList.toggle('active')">Juma</div>
        <div class="day" onclick="this.classList.toggle('active')">Shanba</div>
        <div class="day" onclick="this.classList.toggle('active')">Yakshanba</div>
    </div>
    <button onclick="send()">SAQLASH</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function send() {
            let name = document.getElementById('n').value;
            let phone = document.getElementById('p').value;
            let d = Array.from(document.querySelectorAll('.day.active')).map(x => x.innerText).join(', ');
            if(!name || !phone) return alert("To'ldiring!");
            
            tg.sendData(JSON.stringify({name: name, resp_id: phone, days: d}));
            tg.close();
        }
    </script>
</body>
</html>
