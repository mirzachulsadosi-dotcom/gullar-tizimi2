<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #007bff; }
        .days { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .day { padding: 8px 12px; background: #eee; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .day.active { background: #007bff; color: white; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="margin-top:0">🌸 Gul biriktirish</h3>
        
        <div class="input-group">
            <label>Gul nomi</label>
            <input type="text" id="flower_name" placeholder="Masalan: Fikus">
        </div>

        <div class="input-group">
            <label>Mas'ulning Ismi va Familiyasi</label>
            <input type="text" id="resp_name" placeholder="Ali Valiyev">
        </div>

        <div class="input-group">
            <label>Mas'ulning Telefon raqami</label>
            <input type="tel" id="resp_phone" placeholder="+998901234567">
        </div>

        <label>Sug'orish kunlari:</label>
        <div class="days">
            <div class="day" onclick="this.classList.toggle('active')">Dushanba</div>
            <div class="day" onclick="this.classList.toggle('active')">Seshanba</div>
            <div class="day" onclick="this.classList.toggle('active')">Chorshanba</div>
            <div class="day" onclick="this.classList.toggle('active')">Payshanba</div>
            <div class="day" onclick="this.classList.toggle('active')">Juma</div>
            <div class="day" onclick="this.classList.toggle('active')">Shanba</div>
            <div class="day" onclick="this.classList.toggle('active')">Yakshanba</div>
        </div>

        <button onclick="send()">💾 SAQLASH</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function send() {
            let flower = document.getElementById('flower_name').value;
            let name = document.getElementById('resp_name').value;
            let phone = document.getElementById('resp_phone').value;
            let selectedDays = Array.from(document.querySelectorAll('.day.active')).map(x => x.innerText).join(', ');

            if(!flower || !name || !phone) {
                alert("Iltimos, barcha maydonlarni to'ldiring!");
                return;
            }

            // Ma'lumotlarni JSON qilib yuboramiz
            let data = {
                flower: flower,
                resp_name: name,
                resp_phone: phone,
                days: selectedDays
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
