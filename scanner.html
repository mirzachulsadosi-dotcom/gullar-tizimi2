<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; }
        .btn { padding: 20px 40px; font-size: 20px; background: #248bcf; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <h2>Gullar Nazorati Skaneri</h2>
    <p>QR kodni o'qish uchun pastdagi tugmani bosing</p>
    <button class="btn" onclick="openScanner()">📷 SKANERNI OCHISH</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openScanner() {
            // Telegram ichki skanerini ochish buyrug'i
            tg.showScanQrPopup({
                text: "Gulning QR kodini kameraga qarating"
            }, function(text) {
                // Skanerlanganda olingan matnni (masalan: ...?start=15) botga yuborish
                tg.sendData(text); 
                tg.closeScanQrPopup(); // Skanerni yopish
                tg.close(); // Mini Appni yopish
            });
        }
    </script>
</body>
</html>
